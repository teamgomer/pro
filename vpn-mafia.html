<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Panel - ชุดที่ 244</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-6">

    <h1 class="text-3xl font-bold text-center mb-10 text-blue-400">Config ชุดที่ 244</h1>

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <script>
            // ฟังก์ชันคัดลอก Config
            function copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => {
                    alert("คัดลอก Config เรียบร้อยแล้ว!");
                });
            }

            // ฟังก์ชันดาวน์โหลดรูป QR
            async function downloadImage(imageSrc, name) {
                const response = await fetch(imageSrc);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name + ".jpg";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            // ฟังก์ชันสร้าง Card (ปรับปรุง: ลบปุ่ม .txt ออกแล้ว)
            function createCard(title, app, imgSrc, appLink, configContent) {
                document.write(`
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl hover:border-blue-500 transition-all">
                        <div class="mb-4">
                            <span class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase">${app}</span>
                            <h2 class="text-xl font-bold mt-2">${title}</h2>
                        </div>
                        <img src="${imgSrc}" alt="${title}" class="w-full h-auto rounded-lg mb-4 border-2 border-slate-700">
                        
                        <div class="flex flex-col gap-2">
                            <button onclick="copyToClipboard(\`${configContent}\`)" class="w-full bg-emerald-600 hover:bg-emerald-700 py-2 rounded-lg text-sm font-bold transition">คัดลอก Config</button>
                            <button onclick="downloadImage('${imgSrc}', '${title}')" class="w-full bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-sm font-bold transition">บันทึก QR Code</button>
                            <a href="${appLink}" target="_blank" class="w-full bg-blue-500 hover:bg-blue-700 py-2 rounded-lg text-sm font-bold text-center transition">ดาวน์โหลดแอป ${app}</a>
                        </div>
                    </div>
                `);
            }
        </script>

        <script>
            const v2boxLink = "https://play.google.com/store/apps/details?id=dev.hexasoftware.v2box";
            const netmodLink = "https://play.google.com/store/apps/details?id=com.netmod.syna";

            // ใส่ Config จริงของคุณลงในช่องสุดท้ายแทนที่ข้อความ vless://...
            createCard("AIS โปร 64K 128K", "V2BOX", "https://img1.pic.in.th/images/14392.jpg", v2boxLink, "vless://your-actual-config-string-here");
            createCard("TRUE โปร ZOOM", "V2BOX", "https://img2.pic.in.th/14393.jpg", v2boxLink, "vmess://your-actual-config-string-here");
            createCard("DTAC โปร GAMING", "NETMOD", "https://img2.pic.in.th/14396.jpg", netmodLink, "your-netmod-config-string-here");
            createCard("TRUE โปร TWITTER & IG", "NETMOD", "https://img1.pic.in.th/images/14397.jpg", netmodLink, "your-netmod-config-string-here");
        </script>

    </div>
</body>
</html>
