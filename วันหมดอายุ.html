<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คำนวณวันหมดอายุ</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .container { max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        .result { font-weight: bold; color: blue; }
    </style>
</head>
<body>

<div class="container">
    <h2>คำนวณวันหมดอายุ</h2>
    
    <div>
        <label>วันที่เริ่มใช้งาน:</label>
        <input type="date" id="startDate">
    </div>

    <div>
        <label>จำนวนเดือนที่ใช้งาน:</label>
        <input type="number" id="months" placeholder="ระบุจำนวนเดือน" min="1">
    </div>

    <button onclick="calculateExpiry()">คำนวณ</button>

    <div style="margin-top: 20px;">
        วันหมดอายุ: <span id="expiryDate" class="result">-</span>
    </div>
</div>

<script>
    function calculateExpiry() {
        const startDateInput = document.getElementById('startDate').value;
        const months = parseInt(document.getElementById('months').value);
        
        if (!startDateInput || !months) {
            alert("กรุณากรอกข้อมูลให้ครบถ้วน");
            return;
        }

        let date = new Date(startDateInput);
        
        // คำนวณวันหมดอายุ
        // การตั้งค่าเดือนใหม่: setMonth จะจัดการเรื่องปีข้ามให้อัตโนมัติ
        date.setMonth(date.getMonth() + months);

        // ปรับลดลง 1 วันเพื่อให้เป็นวันสุดท้ายของรอบการใช้งาน
        date.setDate(date.getDate() - 1);

        document.getElementById('expiryDate').innerText = date.toLocaleDateString('th-TH', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
    }
</script>

</body>
</html>
