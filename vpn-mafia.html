<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Panel - ชุดที่ 244</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-6">

    <h1 class="text-3xl font-bold text-center mb-10 text-blue-400">Config ชุดที่ 244</h1>

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <script>
            function createCard(title, app, imgSrc) {
                document.write(`
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl hover:border-blue-500 transition-all">
                        <div class="mb-4">
                            <span class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase">${app}</span>
                            <h2 class="text-xl font-bold mt-2">${title}</h2>
                        </div>
                        <img src="${imgSrc}" alt="${title}" class="w-full h-auto rounded-lg mb-4 border-2 border-slate-700">
                        <p class="text-slate-400 text-sm text-center">สแกนเพื่อใช้งานกับแอป ${app}</p>
                    </div>
                `);
            }
        </script>

        <script>
            createCard("AIS โปร 64K 128K", "V2BOX", "https://img1.pic.in.th/images/14392.jpg");
            createCard("TRUE โปร ZOOM", "V2BOX", "https://img2.pic.in.th/14393.jpg");
            createCard("DTAC โปร GAMING", "NETMOD", "https://img2.pic.in.th/14396.jpg");
            createCard("TRUE โปร TWITTER & IG", "NETMOD", "https://img1.pic.in.th/images/14397.jpg");
        </script>

    </div>
</body>
</html>
