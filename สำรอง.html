<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Panel - Dark Tunnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-white min-h-screen p-4 md:p-10 font-sans">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-400 mb-2">DARK TUNNEL Config</h1>
            <p class="text-slate-400">ชุด Config แรงๆ อัปเดตใหม่ล่าสุด</p>
        </div>

        <!-- App Download Link -->
        <div class="flex justify-center mb-10">
            <a href="https://play.google.com/store/apps/details?id=net.darktunnel.app" 
               target="_blank"
               class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105">
                📥 ดาวน์โหลดแอป DARK TUNNEL
            </a>
        </div>

        <!-- Config Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Card V.1 -->
            <div class="glass-card p-6 rounded-3xl shadow-xl">
                <span class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs font-bold uppercase">Version 1</span>
                <h2 class="text-xl font-bold mt-4 mb-4">AIS SSH V.1 ⚡</h2>
                <button onclick="copyConfig('darktunnel://eyJ0eXBlIjoiU1NIIiwibmFtZSI6IkFJUyBTU0ggVi4xIPCfmIEiLCJzc2hUdW5uZWxDb25maWciOnsic3NoQ29uZmlnIjp7Imhvc3QiOiJ2aXAyLmJ1Z2hvc3Quc2l0ZSIsInVzZXJuYW1lIjoiYW0xMTExIiwicGFzc3dvcmQiOiJhbTExMTEifSwiaW5qZWN0Q29uZmlnIjp7Im1vZGUiOiJQUk9YWSIsInByb3h5SG9zdCI6IjEwNC4xOC40LjUwIiwicHJveHlQb3J0Ijo4ODgwLCJwYXlsb2FkIjoiR0VUIC8gSFRUUC8xLjFbY3JsZl1Ib3N0OiB3d3cuYWlzLnRoW2NybGZdW2NybGZdW3NwbGl0XVBBVENIIC8gSFRUUC8xLjFbY3JsZl1Ib3N0OiBbaG9zdF1bY3JsZl1VcGdyYWRlOiB3ZWJzb2NrZXRbY3JsZl1Vc2VyLUFnZW50OiBbdWFdW2NybGZdW2NybGZdIn19fQ==')" 
                        class="w-full bg-white text-slate-900 font-bold py-3 rounded-xl hover:bg-slate-200 transition">
                    คัดลอก Config V.1
                </button>
            </div>

            <!-- Card V.2 -->
            <div class="glass-card p-6 rounded-3xl shadow-xl">
                <span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold uppercase">Version 2</span>
                <h2 class="text-xl font-bold mt-4 mb-4">AIS SSH V.2 🚀</h2>
                <button onclick="copyConfig('darktunnel://eyJ0eXBlIjoiU1NIIiwibmFtZSI6IkFJUyBTU0ggVi4yIPCfpJ8iLCJzc2hUdW5uZWxDb25maWciOnsic3NoQ29uZmlnIjp7Imhvc3QiOiJ2aXAyLmJ1Z2hvc3Quc2l0ZSIsInVzZXJuYW1lIjoiYW0xMTExIiwicGFzc3dvcmQiOiJhbTExMTEifSwiaW5qZWN0Q29uZmlnIjp7Im1vZGUiOiJQUk9YWSIsInByb3h5SG9zdCI6IjEwNC4xNy4xOTguOCIsInByb3h5UG9ydCI6ODg4MCwicGF5bG9hZCI6IkdFVCAvIEhUVFAvMS4xW2NybGZdSG9zdDogd3d3LmFpcy5jby50aFtjcmxmXVtjcmxmXVtzcGxpdF1QQVRDSCAvIEhUVFAvMS4xW2NybGZdSG9zdDogW2hvc3RdW2NybGZdVXBncmFkZTogd2Vic29ja2V0W2NybGZdVXNlci1BZ2VudDogW3VhXVtjcmxmXVtjcmxmXSJ9fX0=')" 
                        class="w-full bg-white text-slate-900 font-bold py-3 rounded-xl hover:bg-slate-200 transition">
                    คัดลอก Config V.2
                </button>
            </div>

        </div>
    </div>

    <script>
        function copyConfig(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("คัดลอก Config สำเร็จแล้ว! นำไปวางในแอปได้เลย");
            }).catch(err => {
                alert("เกิดข้อผิดพลาดในการคัดลอก");
            });
        }
    </script>
</body>
</html>
