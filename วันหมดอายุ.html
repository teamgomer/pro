<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>MLD SHOP - Dino Expiry Tracker</title>
    <style>
        :root {
            --dino-green: #5d8e5e;
            --dino-earth: #8b5e3c;
            --dino-light: #f4ece0;
        }
        body { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            background: linear-gradient(135deg, #2d5a27, #5d8e5e); 
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        /* ส่วนของ Dino Particles */
        .dino { position: absolute; font-size: 30px; animation: float 10s infinite linear; opacity: 0.6; pointer-events: none; }
        @keyframes float { 0% { transform: translateY(100vh) translateX(0); } 100% { transform: translateY(-10vh) translateX(100px); } }

        .card { 
            background: var(--dino-light); padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 90%; max-width: 400px;
            border: 5px solid var(--dino-earth); z-index: 10;
        }
        h2 { color: var(--dino-earth); text-align: center; margin: 0 0 15px 0; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; border: 2px solid var(--dino-earth); border-radius: 10px; box-sizing: border-box; background: #fff5e6; }
        button { 
            width: 100%; padding: 12px; background: var(--dino-earth); color: white; 
            border: none; border-radius: 10px; font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #6d4a2e; transform: scale(1.02); }
        .result-box { margin-top: 20px; padding: 15px; background: #d7ccc8; border-radius: 10px; text-align: center; border: 2px dashed var(--dino-earth); }
    </style>
</head>
<body>

<div class="dino" style="left: 10%; animation-delay: 0s;">🦕</div>
<div class="dino" style="left: 30%; animation-delay: 2s;">🦖</div>
<div class="dino" style="left: 60%; animation-delay: 4s;">🦕</div>
<div class="dino" style="left: 80%; animation-delay: 6s;">🦖</div>

<div class="card">
    <h2>MLD SHOP 🦕</h2>
    <div class="form-group">
        <label>วันเริ่มใช้งาน:</label>
        <input type="datetime-local" id="startDateTime">
    </div>
    <div class="form-group">
        <label>จำนวนเดือน:</label>
        <input type="number" id="months" placeholder="จำนวนเดือน...">
    </div>
    <button onclick="calculateExpiry()">คำนวณวันสิ้นโลก (หมดอายุ)</button>

    <div class="result-box">
        <div>หมดอายุวันที่:</div>
        <div id="expiryResult" style="font-weight: bold; font-size: 1.2em;">-</div>
    </div>
</div>

<script>
    function calculateExpiry() {
        const start = new Date(document.getElementById('startDateTime').value);
        const m = parseInt(document.getElementById('months').value);
        if (isNaN(m) || !document.getElementById('startDateTime').value) return alert("กรุณาระบุข้อมูล!");
        
        start.setMonth(start.getMonth() + m);
        start.setSeconds(start.getSeconds() - 1);
        document.getElementById('expiryResult').innerText = start.toLocaleString('th-TH');
    }
</script>

</body>
</html>
