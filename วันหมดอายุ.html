<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; }
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .row { display: flex; justify-content: space-between; margin: 20px 0; }
        .box { background: #f9fafb; padding: 15px; border-radius: 12px; width: 45%; text-align: center; border: 1px solid #e5e7eb; }
        .label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; }
        .value { font-size: 1rem; font-weight: 600; color: #111827; margin-top: 5px; }
        .time-display { font-size: 0.9rem; color: var(--primary); font-weight: 600; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #d1d5db; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .status-box { margin-top: 20px; padding: 15px; border-radius: 12px; text-align: center; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <h3>📅 เช็ควันหมดอายุ (แบบละเอียด)</h3>
    <div id="currentTime" class="time-display"></div>
    <label>เลือกวันที่เริ่มต้น:</label>
    <input type="date" id="startDate">
    <button onclick="calculate()">คำนวณสถานะ</button>

    <div class="row">
        <div class="box">
            <div class="label">เริ่มต้น</div>
            <div id="startInfo" class="value">-</div>
        </div>
        <div class="box">
            <div class="label">หมดอายุ</div>
            <div id="endInfo" class="value">-</div>
        </div>
    </div>
    <div id="status" class="status-box" style="display:none;"></div>
</div>

<script>
    // แสดงเวลาปัจจุบันแบบ Real-time
    function updateClock() {
        const now = new Date();
        document.getElementById('currentTime').innerText = "เวลาปัจจุบัน: " + now.toLocaleTimeString('th-TH');
    }
    setInterval(updateClock, 1000);

    function calculate() {
        const input = document.getElementById('startDate').value;
        if (!input) return alert("โปรดเลือกวันที่");

        const start = new Date(input);
        const end = new Date(start);
        end.setDate(start.getDate() + 30);
