<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Status Checker</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #38bdf8; }
        textarea { width: 100%; height: 120px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; padding: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; margin-top: 15px; cursor: pointer; font-weight: bold; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; background: #334155; }
    </style>
</head>
<body>

<div class="card">
    <h2>ตรวจสอบวันหมดอายุ</h2>
    <textarea id="config" placeholder="วางลิงก์ VLESS/VMESS/V2Ray ที่นี่..."></textarea>
    <button onclick="check()">ตรวจสอบสถานะ</button>
    
    <div id="result" class="result">
        <p>สถานะ: <span id="status"></span></p>
        <p>หมดอายุวันที่: <span id="exp"></span></p>
        <p>เหลือเวลา: <span id="days"></span></p>
    </div>
</div>

<script>
    function check() {
        const input = document.getElementById('config').value;
        const resDiv = document.getElementById('result');
        
        // นี่คือ Logic พื้นฐานในการตรวจ
        if(input.includes("vmess://") || input.includes("vless://")) {
            resDiv.style.display = "block";
            document.getElementById('status').innerText = "ใช้งานได้";
            document.getElementById('exp').innerText = "16/07/2026"; // ตัวอย่างข้อมูล
            document.getElementById('days').innerText = "30 วัน";
        } else {
            alert("ลิงก์ไม่ถูกต้อง!");
        }
    }
</script>
</body>
</html>
