<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>MLD SHOP - Dino Expiry Tracker</title>
    <style>
        :root { --dino-green: #5d8e5e; --dino-earth: #8b5e3c; --dino-light: #f4ece0; }
        body { font-family: 'Comic Sans MS', cursive; background: linear-gradient(135deg, #2d5a27, #5d8e5e); min-height: 100vh; padding: 20px; color: #3e2723; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 450px; width: 100%; }
        .card { background: var(--dino-light); padding: 25px; border-radius: 20px; border: 5px solid var(--dino-earth); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: var(--dino-earth); margin-bottom: 20px; }
        label { font-weight: bold; color: var(--dino-earth); }
        input { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 2px solid var(--dino-earth); border-radius: 10px; box-sizing: border-box; background: #fffcf8; }
        button { width: 100%; padding: 12px; background: var(--dino-earth); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #6d4a2e; }
        .footer-img { text-align: center; margin-top: 25px; }
        .footer-img img { max-width: 100%; height: auto; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>MLD SHOP 🦕</h2>
        <label>วันที่และเวลาเริ่มต้น:</label>
        <input type="datetime-local" id="startDateTime">
        <label>จำนวนเดือนที่ใช้งาน:</label>
        <input type="number" id="months" placeholder="ระบุจำนวนเดือน...">
        <button onclick="calculateExpiry()">คำนวณวันหมดอายุ</button>
    </div>

    <div class="footer-img">
        <a href="https://pic.in.th/image/18295.18295" target="_blank">
            <img src="https://img1.pic.in.th/images/18295.png" alt="18295">
        </a>
    </div>
</div>

<script>
    function calculateExpiry() {
        const startInput = document.getElementById('startDateTime').value;
        const monthsToAdd = parseInt(document.getElementById('months').value);
        
        if (!startInput || isNaN(monthsToAdd)) {
            alert("กรุณากรอกวันที่และจำนวนเดือนให้ครบถ้วนครับ!");
            return;
        }

        const startDate = new Date(startInput);
        let expiryDate = new Date(startInput);
        expiryDate.setMonth(expiryDate.getMonth() + monthsToAdd);
        expiryDate.setSeconds(expiryDate.getSeconds() - 1);

        const options = { 
            year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit' 
        };
        
        const startStr = startDate.toLocaleString('th-TH', options);
        const expiryStr = expiryDate.toLocaleString('th-TH', options);

        alert("วันที่เริ่มใช้งาน:\n" + startStr + "\n\nวันหมดอายุ:\n" + expiryStr);
    }
</script>

</body>
</html>
