<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLD Shop | Premium Config</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #050505; overflow-x: hidden; }
        
        /* แสงออร่าเท่ๆ */
        .glow-box { position: relative; }
        .glow-box::before { content: ""; position: absolute; inset: -2px; background: linear-gradient(45deg, #3b82f6, #10b981, #3b82f6); border-radius: 1.5rem; z-index: -1; opacity: 0.3; transition: 0.3s; }
        .glow-box:hover::before { opacity: 1; }

        /* การเคลื่อนไหวของพื้นหลัง */
        .bg-animate { background: linear-gradient(45deg, #0f172a, #050505, #1e1b4b); background-size: 200% 200%; animation: gradient 10s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="bg-animate text-white min-h-screen p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12 animate-fade-in">
            <h1 class="text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-4">MLD SHOP</h1>
            <div class="w-24 h-1 bg-blue-500 mx-auto rounded-full"></div>
        </header>

        <!-- Tabs -->
        <div class="flex justify-center gap-6 mb-10">
            <button onclick="showTab('android')" id="btn-android" class="px-8 py-3 rounded-2xl bg-blue-600 font-bold transform hover:scale-105 transition-all shadow-[0_0_15px_rgba(37,99,235,0.5)]">ANDROID</button>
            <button onclick="showTab('ios')" id="btn-ios" class="px-8 py-3 rounded-2xl bg-slate-900 border border-slate-700 font-bold hover:bg-slate-800 transition-all">iOS</button>
        </div>

        <!-- Content -->
        <div id="content-android" class="space-y-8">
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Card 1 -->
                <div class="glow-box bg-slate-900 p-8 rounded-3xl border border-slate-800 hover:translate-y-[-10px] transition-all">
                    <h2 class="text-2xl font-bold mb-4 text-blue-400">AIS SSH V.1</h2>
                    <button onclick="copyConfig('darktunnel://...')" class="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-blue-400 transition-colors">คัดลอก CONFIG</button>
                </div>
                <!-- Card 2 -->
                <div class="glow-box bg-slate-900 p-8 rounded-3xl border border-slate-800 hover:translate-y-[-10px] transition-all">
                    <h2 class="text-2xl font-bold mb-4 text-emerald-400">AIS SSH V.2</h2>
                    <button onclick="copyConfig('darktunnel://...')" class="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-emerald-400 transition-colors">คัดลอก CONFIG</button>
                </div>
            </div>
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
                <p class="text-sm leading-relaxed"><b>วิธีติดตั้ง:</b> เปิด Dark Tunnel > สามจุดบนขวา > Config > Import > Clipboard > OK > Connected</p>
            </div>
        </div>

        <!-- iOS Content (Hidden by default) -->
        <div id="content-ios" class="hidden space-y-8">
            <!-- คล้ายกับ Android แต่ปรับเป็นของ iOS -->
            <div class="text-center p-10 bg-slate-900 rounded-3xl border border-slate-800">
                <p class="text-blue-400 font-bold mb-4">สถานะ: ระบบ iOS พร้อมใช้งาน</p>
                <a href="https://apps.apple.com/us/app/npv-tunnel/id1629465476" class="text-sm underline">ดาวน์โหลดแอป NPV TUNNEL ที่นี่</a>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('content-android').classList.toggle('hidden', tab !== 'android');
            document.getElementById('content-ios').classList.toggle('hidden', tab !== 'ios');
            // เพิ่มสไตล์ปุ่มให้ดูสลับกัน
            document.getElementById('btn-android').className = tab === 'android' ? 'px-8 py-3 rounded-2xl bg-blue-600 font-bold transform hover:scale-105 transition-all shadow-[0_0_15px_rgba(37,99,235,0.5)]' : 'px-8 py-3 rounded-2xl bg-slate-900 border border-slate-700 font-bold';
            document.getElementById('btn-ios').className = tab === 'ios' ? 'px-8 py-3 rounded-2xl bg-blue-600 font-bold transform hover:scale-105 transition-all shadow-[0_0_15px_rgba(37,99,235,0.5)]' : 'px-8 py-3 rounded-2xl bg-slate-900 border border-slate-700 font-bold';
        }
        function copyConfig(text) {
            navigator.clipboard.writeText(text).then(() => alert("คัดลอก Config เรียบร้อย!"));
        }
    </script>
</body>
</html>
