<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>MLD SHOP - Dino Expiry Tracker</title>
    <style>
        :root { --dino-green: #5d8e5e; --dino-earth: #8b5e3c; --dino-light: #f4ece0; }
        body { font-family: 'Comic Sans MS', cursive; background: linear-gradient(135deg, #2d5a27, #5d8e5e); min-height: 100vh; padding: 20px; color: #3e2723; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--dino-light); padding: 25px; border-radius: 20px; border: 5px solid var(--dino-earth); margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 2px solid var(--dino-earth); border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--dino-earth); color: white; border: none; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; font-size: 0.9em; }
        th { background: var(--dino-earth); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>MLD SHOP 🦕</h2>
        <label>วันที่และเวลาเริ่มต้น:</label>
        <input type="datetime-local" id="startDateTime">
        <label>จำนวนเดือนที่ใช้งาน:</label>
        <input type="number" id="months" placeholder="ระบุจำนวนเดือน...">
        <button onclick="saveAndCalculate()">บันทึกและคำนวณ</button>
    </div>

    <div class="card">
        <h3>📜 ประวัติการเช็ควันหมดอายุ</h3>
        <table id="historyTable">
            <thead>
                <tr><th>เริ่มใช้</th><th>หมดอายุ</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
        <button onclick="clearHistory()" style="background:#c62828; margin-top:10px;">ล้างประวัติ</button>
    </div>
</div>

<script>
    function saveAndCalculate() {
        const start = document.getElementById('startDateTime').value;
        const m = parseInt(document.getElementById('months').value);
        if (!start || !m) return alert("กรอกข้อมูลให้ครบ!");

        let date = new Date(start);
        date.setMonth(date.getMonth() + m);
        date.setSeconds(date.getSeconds() - 1);
        const expiry = date.toLocaleString('th-TH');

        // บันทึกลง LocalStorage
        let history = JSON.parse(localStorage.getItem('mldHistory') || '[]');
        history.unshift({ start: start, expiry: expiry });
        localStorage.setItem('mldHistory', JSON.stringify(history.slice(0, 5))); // เก็บ 5 รายการล่าสุด
        
        renderHistory();
    }

    function renderHistory() {
        const body = document.getElementById('historyBody');
        const history = JSON.parse(localStorage.getItem('mldHistory') || '[]');
        body.innerHTML = history.map(item => `<tr><td>${item.start.replace('T', ' ')}</td><td>${item.expiry}</td></tr>`).join('');
    }

    window.onload = renderHistory;
    function clearHistory() { localStorage.removeItem('mldHistory'); renderHistory(); }
</script>

</body>
</html>
