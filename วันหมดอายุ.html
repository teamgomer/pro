<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --bg: #f3f4f6;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h3 { color: #1f2937; margin-bottom: 1.5rem; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover { background: #4338ca; transform: translateY(-2px); }

        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h3>📅 เช็ควันหมดอายุไฟล์</h3>
    <input type="date" id="fileDate">
    <button onclick="checkExpiration()">ตรวจสอบสถานะ</button>
    <div id="result"></div>
</div>

<script>
    function checkExpiration() {
        const inputVal = document.getElementById('fileDate').value;
        const resultDiv = document.getElementById('result');
        if (!inputVal) return alert("โปรดเลือกวันที่");

        const fileDate = new Date(inputVal);
        fileDate.setHours(0,0,0,0);
        const today = new Date();
        today.setHours(0,0,0,0);
        const expiryDate = new Date(today);
        expiryDate.setDate(today.getDate() + 30);

        resultDiv.style.display = 'block';

        if (fileDate < today) {
            resultDiv.style.background = '#fee2e2';
            resultDiv.style.color = '#991b1b';
            resultDiv.innerHTML = "❌ หมดอายุแล้ว";
        } else if (fileDate <= expiryDate) {
            resultDiv.style.background = '#fef3c7';
            resultDiv.style.color = '#92400e';
            resultDiv.innerHTML = "⚠️ ใกล้หมดอายุ (ภายใน 30 วัน)";
        } else {
            resultDiv.style.background = '#d1fae5';
            resultDiv.style.color = '#065f46';
            resultDiv.innerHTML = "✅ ยังใช้งานได้ปกติ";
        }
    }
</script>
</body>
</html>
