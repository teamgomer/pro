<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>MLD SHOP - Expiry Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        :root {
            --primary: #4a90e2;
            --bg: #f8f9fa;
            --text: #333;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            display: flex; flex-direction: column; 
            min-height: 100vh; margin: 0; padding: 40px 20px;
            align-items: center;
        }

        .container { max-width: 500px; width: 100%; }

        .card { 
            background: var(--card-bg); 
            padding: 45px; 
            border-radius: 32px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            text-align: center;
            margin-bottom: 30px;
        }

        .logo { max-width: 160px; margin-bottom: 25px; }

        h2 { color: var(--primary); margin-top: 0; margin-bottom: 30px; font-size: 2em; font-weight: 600; }

        label { font-size: 1.1em; color: #555; margin-bottom: 12px; display: block; text-align: left; }

        input { 
            width: 100%; padding: 20px; margin-bottom: 25px; 
            border: 2px solid #eee; border-radius: 16px; 
            box-sizing: border-box; font-size: 1.2em; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        button { 
            width: 100%; padding: 20px; background: var(--primary); 
            color: white; border: none; border-radius: 16px; 
            cursor: pointer; font-size: 1.3em; font-weight: 600; transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #357abd; transform: translateY(-3px); }

        .instruction {
            background: #ffffff;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            border: 1px solid #eee;
            text-align: left;
            line-height: 1.8;
            color: #555;
        }
        .instruction h3 { color: var(--primary); margin-top: 0; }
        .instruction ol { padding-left: 20px; }
        
        /* สไตล์สำหรับปุ่มลิงค์ร้าน */
        .btn-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 20px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            text-align: center;
        }
        .btn-link:hover { background-color: #219150; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <img src="https://img1.pic.in.th/images/18297.png" alt="MLD SHOP Logo" class="logo">
        
        <h2>MLD SHOP</h2>
        <label>วันที่และเวลาเริ่มต้น</label>
        <input type="datetime-local" id="startDateTime">
        
        <label>จำนวนวันใช้งาน</label>
        <input type="number" id="days" placeholder="ระบุจำนวนวัน (เช่น 30, 90, 365)">
        
        <button onclick="calculateExpiry()">คำนวณวันหมดอายุ</button>
    </div>

    <div class="instruction">
        <h3>ขั้นตอนการเข้าเช็ควันหมดอายุ</h3>
        <ol>
            <li>ให้กดปุ่ม <b>"ไปที่ประวัติการซื้อ"</b> ด้านล่างนี้</li>
            <li>ให้ดูบริเวณ <b>ดูข้อมูลไฟล์</b> จะมีวันที่ระบุอยู่ ให้นำมากรอกตรง <b>วันเริ่มใช้งาน</b></li>
            <li>จำนวนวัน ให้ระบุตามระยะเวลาที่ซื้อ (เช่น 30 วัน, 90 วัน เป็นต้น)</li>
        </ol>
        <div style="text-align: center;">
            <a href="https://mldshop.rexzy.xyz/profile/history/shop" target="_blank" class="btn-link">ไปที่ประวัติการซื้อ</a>
        </div>
    </div>
</div>

<script>
    function calculateExpiry() {
        const startInput = document.getElementById('startDateTime').value;
        const daysToAdd = parseInt(document.getElementById('days').value);
        
        if (!startInput || isNaN(daysToAdd)) {
            alert("กรุณากรอกวันที่และจำนวนวันให้ครบถ้วนครับ");
            return;
        }

        const startDate = new Date(startInput);
        let expiryDate = new Date(startInput);
        
        expiryDate.setDate(expiryDate.getDate() + daysToAdd);
        expiryDate.setSeconds(expiryDate.getSeconds() - 1);

        const options = { 
            year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit' 
        };
        
        alert("🗓️ วันที่เริ่มใช้งาน:\n" + startDate.toLocaleString('th-TH', options) + 
              "\n\n⏳ วันหมดอายุ:\n" + expiryDate.toLocaleString('th-TH', options));
    }
</script>

</body>
</html>
