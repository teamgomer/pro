<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>MLD SHOP - Expiry Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        :root {
            --primary: #4a90e2;
            --secondary: #50e3c2;
            --bg: #f8f9fa;
            --text: #333;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .container { max-width: 400px; width: 100%; }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-weight: 600; }

        label { font-size: 0.9em; color: #666; margin-bottom: 8px; display: block; }

        input { 
            width: 100%; padding: 14px; margin-bottom: 20px; 
            border: 2px solid #f0f0f0; border-radius: 12px; 
            box-sizing: border-box; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        button { 
            width: 100%; padding: 15px; background: var(--primary); 
            color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s;
        }
        button:hover { background: #357abd; transform: translateY(-2px); }

        .footer-img { text-align: center; margin-top: 30px; }
        .footer-img img { max-width: 150px; opacity: 0.8; transition: 0.3s; }
        .footer-img img:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>MLD SHOP</h2>
        <label>วันที่และเวลาเริ่มต้น</label>
        <input type="datetime-local" id="startDateTime">
        
        <label>จำนวนเดือนที่ใช้งาน</label>
        <input type="number" id="months" placeholder="ระบุตัวเลข (เดือน)">
        
        <button onclick="calculateExpiry()">คำนวณวันหมดอายุ</button>
    </div>

    <div class="footer-img">
        <a href="https://pic.in.th/image/18295.18295" target="_blank">
            <img src="https://img1.pic.in.th/images/18295.png" alt="18295">
        </a>
    </div>
</div>

<script>
    function calculateExpiry() {
        const startInput = document.getElementById('startDateTime').value;
        const monthsToAdd = parseInt(document.getElementById('months').value);
        
        if (!startInput || isNaN(monthsToAdd)) {
            alert("กรุณากรอกข้อมูลให้ครบถ้วนครับ");
            return;
        }

        const startDate = new Date(startInput);
        let expiryDate = new Date(startInput);
        expiryDate.setMonth(expiryDate.getMonth() + monthsToAdd);
        expiryDate.setSeconds(expiryDate.getSeconds() - 1);

        const options = { 
            year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit' 
        };
        
        alert("🗓️ วันที่เริ่มใช้งาน:\n" + startDate.toLocaleString('th-TH', options) + 
              "\n\n⏳ วันหมดอายุ:\n" + expiryDate.toLocaleString('th-TH', options));
    }
</script>

</body>
</html>
