<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLD SHOP - คำนวณวันหมดอายุ</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--primary-color); text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: var(--accent-color); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .result-box { margin-top: 25px; padding: 20px; background: #eef7fd; border-radius: 10px; text-align: center; }
        .result-text { font-size: 1.2em; color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>MLD SHOP</h2>
    
    <div class="form-group">
        <label>วันที่และเวลาเริ่มต้น:</label>
        <input type="datetime-local" id="startDateTime">
    </div>

    <div class="form-group">
        <label>จำนวนเดือนที่ต้องการเพิ่ม:</label>
        <input type="number" id="months" placeholder="ระบุจำนวนเดือน (เช่น 1, 3, 6)" min="1">
    </div>

    <button onclick="calculateExpiry()">คำนวณวันหมดอายุ</button>

    <div class="result-box">
        <label>วันและเวลาหมดอายุ:</label>
        <div id="expiryResult" class="result-text">-</div>
    </div>
</div>

<script>
    function calculateExpiry() {
        const startInput = document.getElementById('startDateTime').value;
        const monthsToAdd = parseInt(document.getElementById('months').value);
        
        if (!startInput || isNaN(monthsToAdd)) {
            alert("กรุณากรอกวันที่/เวลา และจำนวนเดือนให้ครบถ้วน");
            return;
        }

        let date = new Date(startInput);
        
        // เพิ่มจำนวนเดือน
        date.setMonth(date.getMonth() + monthsToAdd);
        
        // ลบออก 1 วินาที เพื่อให้เป็นจุดสิ้นสุดของรอบเวลาที่แม่นยำที่สุด
        date.setSeconds(date.getSeconds() - 1);

        // แสดงผล
        const options = { 
            year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit' 
        };
        
        document.getElementById('expiryResult').innerText = date.toLocaleString('th-TH', options);
    }
</script>

</body>
</html>
